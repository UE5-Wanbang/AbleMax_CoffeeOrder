<!DOCTYPE html>
<html lang="ko">
<head>

    <style>

        body {

            background-color: #f8fafc; 
        }

        .ediya-text { color: #002d5e; }

</head>
<body class="pb-20">

    <header class="ediya-blue text-white py-6 px-4 shadow-lg text-center">

        <p class="text-sm opacity-80 mt-1">단체 주문 시스템</p>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">

                        <option value="레몬차">레몬차</option>
                        <option value="석류차">석류차</option>
                    </optgroup>

                    <optgroup label="❄️ FLATCCINO (플랫치노)">
                        <option value="초콜릿 칩 플랫치노">초콜릿 칩 플랫치노</option>

                        <option value="말차 초코 쉐이크">말차 초코 쉐이크</option>
                        <option value="자몽 포멜로 에이드">자몽 포멜로 에이드</option>
                        <option value="꿀복숭아 에이드">꿀복숭아 에이드</option>

                        <option value="팥 빙수">팥 빙수</option>

    <!-- 기존 모달 그대로 유지 -->
    <div id="orderModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-end z-50">
        <div class="bg-white w-full rounded-t-3xl p-6 animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 id="selectedMenuName" class="text-xl font-bold ediya-text">메뉴명</h3>
                <button onclick="closeModal()" class="text-gray-400 text-3xl leading-none">&times;</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <p class="text-sm font-semibold mb-2">온도</p>
                    <div class="flex gap-2">
                        <button onclick="setTemp('ICED')" class="temp-btn flex-1 py-3 rounded-xl border-2 border-blue-100" id="btnICED">ICED</button>
                        <button onclick="setTemp('HOT')" class="temp-btn flex-1 py-3 rounded-xl border-2 border-blue-100" id="btnHOT">HOT</button>
                    </div>
                </div>

                <div>
                    <p class="text-sm font-semibold mb-2">사이즈</p>
                    <div class="flex gap-2">
                        <button onclick="setSize('L')" class="size-btn flex-1 py-3 rounded-xl border-2 border-blue-100" id="btnSizeL">L (기본)</button>
                        <button onclick="setSize('EX')" class="size-btn flex-1 py-3 rounded-xl border-2 border-blue-100" id="btnSizeEX">EX (엑스트라)</button>
                    </div>
                </div>

                <input type="text" id="extraReq" placeholder="기타 요청사항 (샷추가, 연하게, 디카페인 등)" 
                       class="w-full bg-gray-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-900">

                <button onclick="submitOrder()" 
                        class="w-full ediya-blue text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                    주문 완료하기
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentOrder = { 
            name: '', 
            dept: '', 
            menu: '', 
            temp: 'ICED', 
            size: 'L', 
            extra: '' 
        };

        const menuSelect = document.getElementById('menuSelect');

        function openModal() {
            const selectedValue = menuSelect.value;
            if (!selectedValue) {
                alert("메뉴를 선택해주세요!");
                return;
            }
            currentOrder.menu = selectedValue;
            document.getElementById('selectedMenuName').innerText = selectedValue;
            document.getElementById('orderModal').classList.remove('hidden');
            setTemp('ICED');
            setSize('L');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function setTemp(t) {
            currentOrder.temp = t;
            document.querySelectorAll('.temp-btn').forEach(b => {
                b.classList.remove('bg-blue-900', 'text-white', 'border-blue-900');
            });
            document.getElementById('btn' + t).classList.add('bg-blue-900', 'text-white', 'border-blue-900');
        }

        function setSize(s) {
            currentOrder.size = s;
            document.querySelectorAll('.size-btn').forEach(b => {
                b.classList.remove('bg-blue-900', 'text-white', 'border-blue-900');
            });
            document.getElementById('btnSize' + s).classList.add('bg-blue-900', 'text-white', 'border-blue-900');
        }

        async function submitOrder() {
            currentOrder.name = document.getElementById('userName').value.trim();
            currentOrder.dept = document.getElementById('userDept').value.trim();
            currentOrder.extra = document.getElementById('extraReq').value.trim();

            if (!currentOrder.name) {
                alert("성함을 입력해 주세요!");
                return;
            }
            if (!currentOrder.menu) {
                alert("메뉴를 선택해 주세요!");
                return;
            }

            const GAS_URL = "https://script.google.com/macros/s/AKfycbxE-jpbZ29tk6RaT7aNQ1g974dDsimS8A1H-w-DKKEOozDaecLuTAKByAZBYyiU8t3l/exec";

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(currentOrder)
                });

                console.log("전송 성공!");
                alert("✅ 주문이 완료되었습니다!\n구글 시트를 확인하세요.");
                closeModal();

                // 초기화
                document.getElementById('extraReq').value = '';
                // menuSelect.selectedIndex = 0; // 필요시 주석 해제
            } catch (error) {
                console.error("전송 에러:", error);
                alert("전송 실패: " + error.message);
            }
        }

        // 드롭다운 변경 시 자동으로 모달 열기 (원하시면 주석 처리 가능)
        menuSelect.addEventListener('change', openModal);
    </script>

    <style>
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</body>
</html>
